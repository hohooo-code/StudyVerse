<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 24H 旗艦動漫自習室 | STUDY VERSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #05070a; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .cam-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }
        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            font-size: 0.875rem;
            color: #9ca3af;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .tab-active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .status-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            z-index: 20;
            background: rgba(0,0,0,0.6);
            color: white;
            text-transform: uppercase;
        }
        .font-handwriting { font-family: 'Comic Sans MS', cursive, sans-serif; }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row bg-[#05070a] text-white overflow-hidden">
    
    <div id="startOverlay" class="fixed inset-0 bg-[#05070a] z-[9999] flex items-center justify-center overflow-y-auto">
        <div class="bg-[#111827] p-8 rounded-3xl border border-gray-800 shadow-2xl max-w-md w-full text-center my-4">
            <h1 class="text-3xl font-black text-blue-500 mb-2 tracking-tighter">STUDY VERSE</h1>
            <p class="text-gray-500 text-xs mb-6">AI 視覺偵測系統連線中</p>
            
            <div class="space-y-3 mb-6 text-left">
                <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">Commander Name</label>
                <input id="inputName" class="w-full bg-black p-3 rounded-xl border border-gray-700 text-white outline-none text-sm focus:border-blue-500 transition-all" placeholder="你的暱稱">
                
                <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">Focus Mission</label>
                <input id="inputGoal" class="w-full bg-black p-3 rounded-xl border border-gray-700 text-white outline-none text-sm focus:border-blue-500 transition-all" placeholder="今天的專注目標 (例：刷 50 題數學)">
                
                <label class="text-[10px] text-gray-500 font-bold ml-1 uppercase">AI Protocol</label>
                <select id="inputMode" class="w-full bg-black p-3 rounded-xl border border-gray-700 text-white outline-none text-sm cursor-pointer">
                    <option value="1">👁️ 模式一：線上課程 (偵測分心)</option>
                    <option value="2">🦅 模式二：一般自習 (偵測離座與滑手機)</option>
                    <option value="simulated" selected>🏛️ 模式三：模擬線上教室 (教師連動與截圖)</option>
                </select>

                <div class="relative w-full aspect-video bg-black rounded-xl border border-gray-700 overflow-hidden mt-4">
                    <video id="previewWebcam" class="w-full h-full object-cover scale-x-[-1]" autoplay playsinline muted></video>
                    <div id="previewStatus" class="absolute bottom-2 left-2 text-[10px] text-gray-400 bg-black/60 px-2 py-1 rounded">鏡頭準備中...</div>
                </div>

                <div class="flex items-center gap-3 mt-4">
                    <div class="flex-1 bg-black p-3 rounded-xl border border-gray-700 flex items-center">
                        <span class="text-gray-500 text-xs mr-2 uppercase">Time</span>
                        <input id="inputTime" type="number" class="w-full bg-transparent text-white text-sm outline-none font-mono" value="25">
                        <span class="text-gray-400 text-xs ml-1">min</span>
                    </div>
                </div>
            </div>
            <button id="startBtn" onclick="initApp()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-white shadow-lg shadow-blue-900/20 transition active:scale-95">進入虛擬教室</button>
        </div>
    </div>

    <aside class="w-full md:w-80 bg-[#0a0c14] border-r border-white/5 flex flex-col z-20 h-full">
        <div class="p-6 bg-gradient-to-b from-blue-900/10 to-transparent">
            <div id="clockDate" class="text-blue-400 text-[10px] font-bold mb-1 tracking-widest uppercase">LOADING...</div>
            <div id="clockTime" class="text-4xl font-mono font-bold text-white tracking-tighter">00:00:00</div>
        </div>

        <div class="px-6 py-4">
            <div class="flex justify-between items-end mb-2">
                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Session Timer</span>
                <span id="myTimerDisplay" class="text-2xl font-mono font-bold text-white">00:00</span>
            </div>
            <div class="w-full bg-gray-800/50 h-1.5 rounded-full overflow-hidden">
                <div id="timerProgress" class="h-full bg-blue-500 w-0 transition-all duration-1000"></div>
            </div>
        </div>

        <div class="flex border-b border-white/5 px-2">
            <button onclick="switchTab('rank')" id="btn-rank" class="tab-btn tab-active font-bold">🔥 專注榜</button>
            <button onclick="switchTab('achieve')" id="btn-achieve" class="tab-btn font-bold">🏆 累積數據</button>
        </div>

        <div class="flex-1 relative overflow-hidden bg-black/20">
            <div id="tab-rank" class="absolute inset-0 p-4 space-y-2 overflow-y-auto">
                <p class="text-[10px] text-gray-600 text-center mt-10 uppercase tracking-widest">正在載入專注排行...</p>
            </div>
            <div id="tab-achieve" class="absolute inset-0 p-4 space-y-2 hidden overflow-y-auto">
                <p class="text-[10px] text-gray-600 text-center mt-10 uppercase tracking-widest">正在載入成就系統...</p>
            </div>
        </div>

        <div class="p-4 bg-[#111827]/80 backdrop-blur-sm border-t border-white/10 flex items-center gap-3">
            <img id="mySidebarAvatar" src="https://api.dicebear.com/7.x/big-smile/svg?seed=Study" class="w-12 h-12 rounded-full border-2 border-gray-600 bg-gray-800">
            <div class="flex-1 min-w-0">
                <p id="mySidebarName" class="text-sm font-bold text-white truncate">--</p>
                <p id="mySidebarGoal" class="text-[10px] text-blue-400 truncate uppercase tracking-tighter italic">準備就緒</p>
            </div>
            <div class="text-right">
                <p class="text-[8px] text-gray-500 uppercase">Streak</p>
                <p id="myStreakNum" class="text-xl font-bold text-yellow-500 leading-none">--</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-[#05070a]">
        <header class="h-16 flex justify-between items-center px-6 border-b border-white/5 bg-[#05070a]/50 backdrop-blur-md z-10">
            <div class="flex items-center gap-3">
                <h2 class="text-lg font-bold text-white tracking-tight">虛擬共學空間</h2>
                <span id="modeLabel" class="text-[9px] bg-blue-600/20 text-blue-400 border border-blue-500/30 px-2 py-0.5 rounded-full font-bold uppercase">MODE: 初始化中</span>
            </div>
            
            <div id="breakButtons" class="hidden flex gap-2">
                <button onclick="requestBreak('toilet')" class="bg-blue-600/10 hover:bg-blue-600 text-blue-400 hover:text-white text-[10px] px-3 py-1.5 rounded-full border border-blue-600/30 transition-all font-bold">🚽 洗手間</button>
                <button onclick="requestBreak('water')" class="bg-cyan-600/10 hover:bg-cyan-600 text-cyan-400 hover:text-white text-[10px] px-3 py-1.5 rounded-full border border-cyan-600/30 transition-all font-bold">💧 喝水</button>
            </div>

            <button onclick="endSession()" class="bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white text-xs px-4 py-2 rounded-lg font-bold transition-all border border-red-600/20">結束自習</button>
        </header>

        <div class="flex-1 p-6 overflow-y-auto">
            <div id="blackboard" class="mb-6 bg-slate-800 border-4 border-slate-700 p-4 rounded-xl shadow-inner hidden max-w-4xl mx-auto">
                <h3 class="text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest border-b border-slate-700 pb-1">Teacher's Blackboard / 老師公告區</h3>
                <p id="blackboardContent" class="text-lg text-slate-200 font-handwriting leading-relaxed">
                    目前尚無課堂公告。請保持專注。
                </p>
            </div>

            <div class="cam-grid" id="mainGrid">
                <div class="flex flex-col group">
                    <div id="myDeskFrame" class="relative aspect-video bg-gray-900 rounded-3xl overflow-hidden border-2 border-blue-500/30 shadow-2xl transition-all duration-500">
                        <span class="status-badge">YOU (Self)</span>
                        <video id="webcam" class="w-full h-full object-cover scale-x-[-1]" autoplay playsinline muted></video>
                        
                        <div id="distractionOverlay" class="absolute inset-0 bg-red-950/90 flex flex-col items-center justify-center opacity-0 transition-opacity duration-300 z-30 backdrop-blur-sm">
                            <div class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center mb-4 animate-pulse">
                                <i id="overlayIcon" class="fas fa-eye-slash text-white text-4xl"></i>
                            </div>
                            <span id="overlayText" class="text-white font-black text-xl text-center uppercase tracking-widest">偵測到分心！</span>
                            <p class="text-red-400 text-xs mt-2">請維持專注，AI 持續觀測中</p>
                        </div>
                    </div>
                    <div class="mt-3 bg-[#111827] p-4 rounded-2xl flex items-center gap-3 border border-white/5 shadow-lg">
                        <div id="myStatusBubble" class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_#22c55e]"></div>
                        <p id="dashboardGoal" class="text-xs font-bold text-gray-300 truncate">等待任務分配...</p>
                    </div>
                </div>

                <div id="othersContainer" class="contents"></div>
            </div>
        </div>

        <div class="absolute bottom-8 right-8 flex gap-3 z-50 p-2 rounded-full bg-black/60 backdrop-blur-xl border border-white/10 shadow-2xl">
            <button onclick="sendReaction('🔥')" class="w-12 h-12 flex items-center justify-center hover:bg-white/10 rounded-full text-2xl transition active:scale-90" title="加油！">🔥</button>
            <button onclick="sendReaction('☕')" class="w-12 h-12 flex items-center justify-center hover:bg-white/10 rounded-full text-2xl transition active:scale-90" title="休息一下">☕</button>
            <button onclick="sendReaction('👏')" class="w-12 h-12 flex items-center justify-center hover:bg-white/10 rounded-full text-2xl transition active:scale-90" title="太棒了">👏</button>
            <button onclick="sendReaction('💪')" class="w-12 h-12 flex items-center justify-center hover:bg-white/10 rounded-full text-2xl transition active:scale-90" title="撐住！">💪</button>
        </div>
    </main>

    <script type="module" src="js/ai-core.js"></script>
    
    <script>
        // 從 localStorage 自動填入暱稱
        document.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('studyVerseUser');
            if (savedName) {
                document.getElementById('inputName').value = savedName;
            }
            startPreview();
        });

        // 預覽鏡頭功能
        async function startPreview() {
            const video = document.getElementById('previewWebcam');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                document.getElementById('previewStatus').innerText = "✅ 鏡頭已就緒";
            } catch (err) {
                document.getElementById('previewStatus').innerText = "❌ 無法取得鏡頭權限";
            }
        }

        // 介面標籤切換
        function switchTab(tab) {
            document.getElementById('tab-rank').classList.toggle('hidden', tab !== 'rank');
            document.getElementById('tab-achieve').classList.toggle('hidden', tab !== 'achieve');
            document.getElementById('btn-rank').classList.toggle('tab-active', tab === 'rank');
            document.getElementById('btn-achieve').classList.toggle('tab-active', tab === 'achieve');
        }

        // 時鐘功能
        setInterval(() => {
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-TW', { month: 'long', day: 'numeric', weekday: 'short' });
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });
            
            const clockDate = document.getElementById('clockDate');
            const clockTime = document.getElementById('clockTime');
            if(clockDate) clockDate.innerText = dateStr;
            if(clockTime) clockTime.innerText = timeStr;
        }, 1000);

        // 初始化由 ai-core.js 處理的 initApp 會透過 onclick 呼叫
    </script>
</body>
</html>
