<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手機翻轉自習室 | AI Study Room 連動版</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background-color: #0a0c14; transition: background-color 0.5s ease;
            text-align: center; padding: 20px; box-sizing: border-box; color: white;
            overflow: hidden; /* 防止手機端不經意捲動 */
        }
        h1 { color: #3498db; margin-bottom: 5px; font-weight: 900;}
        .subtitle { color: #7f8c8d; margin-bottom: 30px; font-size: 0.9rem; }
        
        #status-box {
            background: #1a1c24; padding: 30px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        #status { font-size: 1.1rem; font-weight: bold; color: #e74c3c; margin: 15px 0; min-height: 1.5em;}
        #timer { font-size: 3.5rem; font-weight: bold; color: #fff; margin-bottom: 20px; font-variant-numeric: tabular-nums; font-family: monospace;}
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; color: #3498db; margin-bottom: 5px; font-weight: bold;}
        input { 
            width: 100%; border: 1px solid #333; padding: 12px; border-radius: 10px; 
            color: white; box-sizing: border-box; outline: none; background: #000;
            font-size: 16px; /* 防止 iOS 輸入時自動放大 */
        }
        input:focus { border-color: #3498db; }

        button {
            padding: 15px 30px; font-size: 1.2rem; color: white; background-color: #3498db;
            border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
            width: 100%; transition: all 0.2s; font-weight: bold;
        }
        button:hover { background-color: #2980b9; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        
        #stopBtn { background-color: #e74c3c; margin-top: 15px; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);}
        #stopBtn:hover { background-color: #c0392b; }
        
        .hidden { display: none !important; }
        .back-link { margin-top: 30px; color: #7f8c8d; text-decoration: none; font-size: 0.9rem; transition: color 0.3s;}
        .back-link:hover { color: #3498db; }

        /* 連動狀態標籤 */
        #sync-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem;
            margin-bottom: 15px; background: rgba(255,255,255,0.05); color: #555;
            transition: all 0.3s;
        }
        .sync-active { color: #2ecc71 !important; background: rgba(46, 204, 113, 0.1) !important; border: 1px solid rgba(46, 204, 113, 0.2);}
        
        /* 螢幕朝下時的視覺引導 */
        .flip-hint {
            position: absolute; inset: 0; background: #051a10; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 25px; opacity: 0; pointer-events: none; transition: opacity 0.5s;
        }
        .is-flipped .flip-hint { opacity: 1; z-index: 10; }
    </style>
</head>
<body>

    <h1>翻轉連動模式</h1>
    <p class="subtitle">將手機蓋上後，電腦端將豁免手機偵測</p>

    <div id="status-box">
        <div class="flip-hint">
            <div style="font-size: 4rem; margin-bottom: 10px;">🌙</div>
            <p style="font-weight: bold; color: #2ecc71;">深度專注中...</p>
            <p style="font-size: 0.8rem; color: #7f8c8d;">請保持手機翻轉狀態</p>
        </div>

        <div id="sync-badge">未連動 AI 教室</div>
        
        <div id="timer">00:00:00</div>
        <div id="status">請先輸入大廳暱稱</div>

        <div id="setup-area">
            <div class="input-group">
                <label>連動暱稱 (需與電腦端相同)</label>
                <input type="text" id="syncName" placeholder="例如：小明" maxlength="10">
            </div>
            <button id="startBtn">啟動連動監測</button>
        </div>
        
        <button id="stopBtn" class="hidden">結束並斷開連動</button>
    </div>

    <a href="index.html" class="back-link">← 返回專業大廳</a>

    <script>
        // 初始化 Socket (確保連接到正確的 server)
        const socket = io(); 
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDisplay = document.getElementById('status');
        const timerDisplay = document.getElementById('timer');
        const syncBadge = document.getElementById('sync-badge');
        const setupArea = document.getElementById('setup-area');
        const syncNameInput = document.getElementById('syncName');
        const statusBox = document.getElementById('status-box');

        let isTracking = false;   
        let isFocusing = false;   
        let focusSeconds = 0;     
        let timerInterval;        
        let warningTimeout;
        let myName = "";

        // 自動讀取上次的暱稱
        const savedName = localStorage.getItem('studyVerseUser');
        if (savedName) syncNameInput.value = savedName;

        function formatTime(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        startBtn.addEventListener('click', async () => {
            myName = syncNameInput.value.trim();
            if (!myName) {
                alert("請輸入暱稱以進行 AI 教室連動！");
                return;
            }
            
            // 儲存暱稱
            localStorage.setItem('studyVerseUser', myName);

            // 請求陀螺儀權限 (iOS 必備)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') { startTracking(); } 
                    else { alert('需要陀螺儀權限才能連動喔！'); }
                } catch (error) { console.error(error); }
            } else {
                startTracking();
            }
        });

        function startTracking() {
            isTracking = true; 
            focusSeconds = 0;
            timerDisplay.textContent = "00:00:00";
            setupArea.classList.add('hidden'); 
            stopBtn.classList.remove('hidden');
            
            statusDisplay.textContent = "✅ 已就緒，請將螢幕朝下平放"; 
            statusDisplay.style.color = "#3498db";
            
            syncBadge.textContent = `● 已與 ${myName} 的 AI 教室連動`;
            syncBadge.classList.add('sync-active');

            // 【關鍵】通知伺服器：該帳號的手機已上線，目前狀態為未翻轉
            socket.emit("join_room", { name: myName, goal: "手機同步模式" });
            socket.emit("update_status", { name: myName, isFlipped: false });

            window.addEventListener('deviceorientation', handleOrientation);
        }

        stopBtn.addEventListener('click', async () => {
            stopTracking();
            statusDisplay.textContent = `本次成果：${formatTime(focusSeconds)}`;
            statusDisplay.style.color = "#7f8c8d";
            document.body.style.backgroundColor = "#0a0c14";

            if (focusSeconds > 0) {
                try {
                    await fetch('/api/save-focus', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: myName,
                            roomType: 'flip-mode', 
                            focusSeconds: focusSeconds
                        })
                    });
                } catch (error) { console.error("儲存失敗:", error); }
            }
        });

        function stopTracking() {
            isTracking = false; isFocusing = false;
            clearInterval(timerInterval); clearTimeout(warningTimeout);
            window.removeEventListener('deviceorientation', handleOrientation);
            setupArea.classList.remove('hidden'); stopBtn.classList.add('hidden');
            syncBadge.classList.remove('sync-active');
            syncBadge.textContent = "未連動 AI 教室";
            statusBox.classList.remove('is-flipped');
            
            // 【關鍵】通知伺服器斷開連動
            socket.emit("update_status", { name: myName, isFlipped: false });
        }

        function handleOrientation(event) {
            if (!isTracking) return;

            const beta = event.beta;
            const gamma = event.gamma;
            
            // 偵測螢幕朝下 (更穩定的範圍判定)
            const isFaceDown = (Math.abs(beta) > 165 || Math.abs(beta) < 15) && Math.abs(gamma) < 25 && beta < 0;
            // 註：有些手機螢幕朝下時 beta 接近 -180 或 0，需視硬體微調。
            // 這裡採用較通用的判定：當 beta 為負值且接近水平時。

            if (isFaceDown && !isFocusing) {
                isFocusing = true;
                clearTimeout(warningTimeout);
                
                statusBox.classList.add('is-flipped');
                document.body.style.backgroundColor = "#051a10"; 

                // 【核心連動】發送翻轉訊號 (讓電腦端 AI 略過手機偵測)
                socket.emit("update_status", { name: myName, status: "FOCUSED", isFlipped: true });
                
                clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    focusSeconds++;
                    timerDisplay.textContent = formatTime(focusSeconds);
                }, 1000);

            } else if (!isFaceDown && isFocusing) {
                isFocusing = false;
                clearInterval(timerInterval);
                
                statusBox.classList.remove('is-flipped');
                statusDisplay.textContent = "⚠️ 偵測到手機拿起！";
                statusDisplay.style.color = "#e74c3c";
                document.body.style.backgroundColor = "#1a0a0a"; 

                // 【核心連動】發送拿起訊號 (電腦端恢復手機偵測)
                socket.emit("update_status", { name: myName, status: "DISTRACTED", isFlipped: false });
                
                warningTimeout = setTimeout(() => {
                    if(!isFocusing) {
                        statusDisplay.textContent = "手機未歸位，計時暫停";
                    }
                }, 2000);
            }
        }
    </script>
</body>
</html>
